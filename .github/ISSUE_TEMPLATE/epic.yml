name: Epic
description: A high-level feature goal broken into stories
labels: ["epic"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What are we trying to achieve?
    validations:
      required: true

  - type: textarea
    id: stories
    attributes:
      label: Stories
      description: List of child story issues (update after creating stories)
      value: |
        - [ ] #__ Story 1: ...
        - [ ] #__ Story 2: ...

  - type: textarea
    id: success-criteria
    attributes:
      label: Success Criteria
      description: How do we know the epic is complete?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Critical
        - P1 - High
        - P2 - Medium
        - P3 - Low
    validations:
      required: true
